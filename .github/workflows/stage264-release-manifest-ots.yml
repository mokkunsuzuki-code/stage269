name: stage264-release-manifest-ots

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-stamp-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install OpenTimestamps client
        run: |
          python -m pip install --upgrade pip
          python -m pip install opentimestamps-client

      - name: Run Stage264 manifest anchor flow
        run: |
          chmod +x tools/run_stage264_manifest_anchor.sh
          ./tools/run_stage264_manifest_anchor.sh

      - name: Upload Stage264 anchor artifacts
        uses: actions/upload-artifact@v6
        with:
          name: stage264-release-anchor
          path: |
            out/release/release_manifest.json
            out/release/release_manifest.json.sha256
            out/release/release_manifest.json.ots
            out/release/github_actions_receipt.json
            out/release/stage264-source-bundle.tar.gz
